# NGINX HTTPS reverse proxy — OpBridge / TrustBridge
# Frontend (internal :3000) and API (internal :5000) served securely on port 443.
#
# First-time setup:  sudo bash deploy/setup-https.sh
# Manual install:    sudo cp deploy/nginx-opbridge.conf /etc/nginx/sites-available/opbridge
#                    sudo nginx -t && sudo systemctl reload nginx
#
# Router port forward:
#   WAN 80  → 192.168.18.139:80   (HTTP → HTTPS redirect + cert renewal)
#   WAN 443 → 192.168.18.139:443  (HTTPS app)
# Do NOT expose 3000 or 5000 to the internet.

upstream opbridge_api {
    server 127.0.0.1:5000;
}

upstream opbridge_web {
    server 127.0.0.1:3000;
}

# HTTP — Let's Encrypt renewal + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name opbridge.serveftp.com www.opbridge.serveftp.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — public entry point
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name opbridge.serveftp.com www.opbridge.serveftp.com;

    ssl_certificate     /etc/letsencrypt/live/opbridge.serveftp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/opbridge.serveftp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 0;

    location / {
        proxy_pass http://opbridge_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://opbridge_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    location /socket.io/ {
        proxy_pass http://opbridge_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }
}

# LAN-only HTTP (optional — hosts file: 192.168.18.139 opbridge.online)
server {
    listen 80;
    listen [::]:80;
    server_name opbridge.online www.opbridge.online;

    client_max_body_size 0;

    location / {
        proxy_pass http://opbridge_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/ {
        proxy_pass http://opbridge_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://opbridge_api/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
