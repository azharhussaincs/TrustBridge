name: Deploy to VM

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, opbridge]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy OpBridge
        run: bash deploy/ci-deploy.sh

      - name: Health check
        run: |
          sleep 5
          curl -fsS "http://127.0.0.1:5000/api/health"
          curl -fsS "http://127.0.0.1:3000/api/health" -o /dev/null
